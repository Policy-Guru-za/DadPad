<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolishPad — Variant 1: Luxury Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1614;
    --cream: #f7f3ee;
    --warm-white: #fdfbf8;
    --gold: #c8a96e;
    --gold-light: #e8d5a8;
    --gold-muted: rgba(200, 169, 110, 0.15);
    --stone: #8a7e72;
    --stone-light: #b8ae9e;
    --rose: #c4716c;
    --shadow-soft: 0 2px 20px rgba(26, 22, 20, 0.06);
    --shadow-elevated: 0 8px 40px rgba(26, 22, 20, 0.08), 0 2px 8px rgba(26, 22, 20, 0.04);
    --radius: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Subtle texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 780px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 48px;
    padding: 0 4px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--ink);
  }

  .brand .edition {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--stone);
  }

  .header-divider {
    width: 100%;
    height: 1px;
    background: var(--ink);
    margin-bottom: 32px;
    position: relative;
  }

  .header-divider::after {
    content: '';
    position: absolute;
    top: -1px;
    left: 0;
    width: 80px;
    height: 3px;
    background: var(--gold);
  }

  /* Mode controls */
  .mode-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding: 0 4px;
  }

  .mode-section {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .mode-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--stone);
  }

  .primary-btn {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 28px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .primary-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .primary-btn:hover::before {
    transform: translateY(0);
  }

  .primary-btn span {
    position: relative;
    z-index: 1;
  }

  .primary-btn:hover {
    color: var(--ink);
  }

  .tone-pills {
    display: flex;
    gap: 2px;
  }

  .tone-pill {
    font-size: 12px;
    font-weight: 400;
    padding: 7px 18px;
    background: transparent;
    color: var(--stone);
    border: 1px solid var(--stone-light);
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
  }

  .tone-pill:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .tone-pill:last-child { border-radius: 0 var(--radius) var(--radius) 0; }

  .tone-pill:hover {
    color: var(--ink);
    border-color: var(--gold);
    background: var(--gold-muted);
  }

  .tone-pill.locked {
    opacity: 0.4;
    cursor: default;
  }

  .after-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--stone-light);
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    font-size: 12px;
    font-weight: 400;
    padding: 8px 20px;
    background: transparent;
    color: var(--stone);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .action-btn:hover {
    color: var(--ink);
    border-color: var(--stone-light);
  }

  .action-btn.copy {
    background: var(--gold);
    color: var(--ink);
    font-weight: 500;
    border: 1px solid var(--gold);
  }

  .action-btn.copy:hover {
    background: var(--gold-light);
  }

  .action-btn.settings {
    border: 1px solid var(--stone-light);
  }

  /* Editor */
  .editor-wrapper {
    position: relative;
    margin-bottom: 24px;
  }

  .editor-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--stone);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  .editor {
    width: 100%;
    min-height: 420px;
    padding: 36px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--ink);
    background: var(--warm-white);
    border: 1px solid rgba(200, 169, 110, 0.25);
    outline: none;
    resize: vertical;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .editor::placeholder {
    color: var(--stone-light);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
  }

  .editor:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-muted), var(--shadow-elevated);
  }

  /* Decorative corner accents */
  .editor-wrapper::before,
  .editor-wrapper::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
    pointer-events: none;
    z-index: 2;
    opacity: 0.5;
  }

  .editor-wrapper::before {
    top: 34px;
    left: -1px;
    border-width: 1px 0 0 1px;
  }

  .editor-wrapper::after {
    bottom: -1px;
    right: -1px;
    border-width: 0 1px 1px 0;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  .stats {
    display: flex;
    gap: 24px;
  }

  .stat {
    font-size: 11px;
    font-weight: 300;
    color: var(--stone);
    letter-spacing: 0.5px;
  }

  .stat strong {
    font-weight: 500;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .stat .divider {
    color: var(--stone-light);
    margin: 0 2px;
  }

  .footer-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .footer-note {
    font-size: 11px;
    font-weight: 300;
    color: var(--stone-light);
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  .attribution {
    font-size: 10px;
    color: var(--stone-light);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .attribution .flag {
    font-size: 12px;
  }

  /* Decorative line element */
  .ornament {
    width: 40px;
    height: 1px;
    background: var(--gold);
    display: inline-block;
    margin: 0 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="brand">
      <h1>PolishPad</h1>
      <span class="edition">Text Studio</span>
    </div>
  </div>

  <div class="header-divider"></div>

  <div class="mode-row">
    <div class="mode-section">
      <span class="mode-label">Transform</span>
      <button class="primary-btn"><span>Polish</span></button>
      <span class="ornament"></span>
      <span class="after-label">Refine after polish</span>
      <div class="tone-pills">
        <button class="tone-pill locked">Casual</button>
        <button class="tone-pill locked">Professional</button>
        <button class="tone-pill locked">Direct</button>
      </div>
    </div>
    <div class="actions">
      <button class="action-btn">Cancel</button>
      <button class="action-btn">Undo</button>
      <button class="action-btn copy">Copy</button>
      <button class="action-btn settings">Settings</button>
    </div>
  </div>

  <div class="editor-wrapper">
    <div class="editor-label">Your Text</div>
    <textarea class="editor" placeholder="Begin writing, or paste your text here. Polish first, then choose a tone if needed."></textarea>
  </div>

  <div class="footer">
    <div class="stats">
      <span class="stat"><strong>0</strong> words</span>
      <span class="stat"><strong>0</strong> characters</span>
      <span class="stat">Last mode <span class="divider">·</span> None</span>
      <span class="stat">Latency <span class="divider">·</span> —</span>
      <span class="stat">Warnings <span class="divider">·</span> None</span>
    </div>
    <div class="footer-right">
      <span class="footer-note">Transforms apply to current text</span>
      <span class="attribution">@laup30 <span class="flag">🇿🇦</span> Cape Town</span>
    </div>
  </div>
</div>

</body>
</html>
