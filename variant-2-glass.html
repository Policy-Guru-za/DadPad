<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolishPad — Variant 2: Frosted Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --text: #1e1e2e;
    --text-soft: #585868;
    --text-muted: #9090a0;
    --surface: rgba(255, 255, 255, 0.55);
    --surface-hover: rgba(255, 255, 255, 0.7);
    --glass: rgba(255, 255, 255, 0.35);
    --glass-border: rgba(255, 255, 255, 0.6);
    --accent: #6366f1;
    --accent-soft: rgba(99, 102, 241, 0.12);
    --accent-glow: rgba(99, 102, 241, 0.2);
    --peach: #fb923c;
    --teal: #2dd4bf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Geist', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: #e8e4f0;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(167, 139, 250, 0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 75% 20%, rgba(251, 146, 60, 0.2) 0%, transparent 55%),
      radial-gradient(ellipse 70% 70% at 50% 80%, rgba(45, 212, 191, 0.2) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 85% 70%, rgba(244, 114, 182, 0.15) 0%, transparent 50%);
    overflow: hidden;
    position: relative;
  }

  /* Animated gradient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: drift 20s ease-in-out infinite;
    pointer-events: none;
  }

  .orb-1 {
    width: 500px; height: 500px;
    background: rgba(167, 139, 250, 0.5);
    top: -10%; left: -5%;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 400px; height: 400px;
    background: rgba(251, 146, 60, 0.35);
    top: 10%; right: -10%;
    animation-delay: -7s;
    animation-duration: 25s;
  }

  .orb-3 {
    width: 350px; height: 350px;
    background: rgba(45, 212, 191, 0.3);
    bottom: -5%; left: 30%;
    animation-delay: -14s;
    animation-duration: 22s;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -20px) scale(1.05); }
    50% { transform: translate(-20px, 30px) scale(0.95); }
    75% { transform: translate(20px, 20px) scale(1.02); }
  }

  .container {
    width: 100%;
    max-width: 800px;
    position: relative;
    z-index: 1;
    animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Glass card */
  .card {
    background: var(--surface);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 36px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.06),
      0 1px 2px rgba(0, 0, 0, 0.04),
      inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px var(--accent-glow);
  }

  .brand-icon svg {
    width: 18px;
    height: 18px;
    color: white;
  }

  .brand h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--text);
    font-style: italic;
  }

  .actions-top {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn {
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
  }

  .btn-ghost:hover {
    background: rgba(0, 0, 0, 0.04);
    color: var(--text-soft);
  }

  .btn-copy {
    background: var(--accent);
    color: white;
    font-weight: 500;
    box-shadow: 0 2px 12px var(--accent-glow);
  }

  .btn-copy:hover {
    background: #5558e6;
    box-shadow: 0 4px 20px var(--accent-glow);
    transform: translateY(-1px);
  }

  .btn-settings {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text-soft);
    backdrop-filter: blur(10px);
  }

  .btn-settings:hover {
    background: var(--surface-hover);
  }

  /* Controls row */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .polish-btn {
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 28px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 16px var(--accent-glow);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .polish-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .polish-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--accent-glow);
  }

  .polish-btn:hover::after {
    opacity: 1;
  }

  .separator {
    width: 1px;
    height: 24px;
    background: rgba(0,0,0,0.08);
  }

  .tone-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tone-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .tone-chips {
    display: flex;
    gap: 4px;
  }

  .tone-chip {
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 6px 14px;
    border-radius: 8px;
    background: var(--glass);
    border: 1px solid rgba(0,0,0,0.06);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(8px);
  }

  .tone-chip:hover {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: rgba(99, 102, 241, 0.2);
  }

  .tone-chip.locked {
    opacity: 0.4;
    cursor: default;
  }

  .unlock-hint {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Editor */
  .editor-section {
    position: relative;
  }

  .editor-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .editor-glass {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    padding: 4px;
    transition: all 0.3s ease;
  }

  .editor-glass:focus-within {
    border-color: rgba(99, 102, 241, 0.3);
    box-shadow: 0 0 0 4px var(--accent-soft);
    background: rgba(255, 255, 255, 0.65);
  }

  textarea {
    width: 100%;
    min-height: 380px;
    padding: 28px 32px;
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.75;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    border-radius: 12px;
  }

  textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    padding: 0 8px;
  }

  .stats {
    display: flex;
    gap: 20px;
  }

  .stat {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-value {
    font-weight: 500;
    color: var(--text-soft);
    font-variant-numeric: tabular-nums;
  }

  .stat-dot {
    width: 3px;
    height: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    opacity: 0.5;
  }

  .footer-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .footer-note {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    font-family: 'Instrument Serif', serif;
  }

  .attribution {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  <div class="card">
    <div class="top-bar">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"/>
          </svg>
        </div>
        <h1>PolishPad</h1>
      </div>
      <div class="actions-top">
        <button class="btn btn-ghost">Cancel</button>
        <button class="btn btn-ghost">Undo</button>
        <button class="btn btn-copy">Copy</button>
        <button class="btn btn-settings">Settings</button>
      </div>
    </div>

    <div class="controls">
      <button class="polish-btn">✦ Polish</button>
      <div class="separator"></div>
      <div class="tone-group">
        <span class="tone-label">After polish</span>
        <div class="tone-chips">
          <button class="tone-chip locked">Casual</button>
          <button class="tone-chip locked">Professional</button>
          <button class="tone-chip locked">Direct</button>
        </div>
        <span class="unlock-hint">Unlocks after one Polish pass</span>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-label">Your text</div>
      <div class="editor-glass">
        <textarea placeholder="Paste or write text here. Polish first, then choose a tone if needed."></textarea>
      </div>
    </div>

    <div class="footer">
      <div class="stats">
        <span class="stat"><span class="stat-value">0</span> words</span>
        <span class="stat-dot"></span>
        <span class="stat"><span class="stat-value">0</span> chars</span>
        <span class="stat-dot"></span>
        <span class="stat">Mode: None</span>
        <span class="stat-dot"></span>
        <span class="stat">Latency: —</span>
        <span class="stat-dot"></span>
        <span class="stat">Warnings: None</span>
      </div>
      <div class="footer-right">
        <span class="footer-note">Transforms apply to current text</span>
        <span class="attribution">@laup30 · 🇿🇦 Cape Town</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
