<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolishPad — Variant 4: Organic Warm</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --earth: #2c2418;
    --bark: #4a3c2e;
    --clay: #a67c52;
    --sand: #d4b896;
    --linen: #f5ede3;
    --parchment: #faf6f0;
    --white: #fdfcfa;
    --sage: #7a9b7e;
    --sage-soft: rgba(122, 155, 126, 0.12);
    --sage-border: rgba(122, 155, 126, 0.25);
    --terracotta: #c4715b;
    --terracotta-soft: rgba(196, 113, 91, 0.1);
    --shadow: 0 1px 3px rgba(44, 36, 24, 0.05);
    --shadow-lg: 0 12px 48px rgba(44, 36, 24, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--linen);
    color: var(--earth);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
  }

  /* Organic texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 80% at 30% 0%, rgba(212, 184, 150, 0.3), transparent 60%),
      radial-gradient(ellipse 80% 60% at 80% 90%, rgba(122, 155, 126, 0.1), transparent 50%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 780px;
    position: relative;
    z-index: 1;
    animation: grow 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes grow {
    from { opacity: 0; transform: scale(0.98) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Card */
  .card {
    background: var(--parchment);
    border-radius: 28px;
    padding: 40px;
    box-shadow: var(--shadow-lg);
    border: 1px solid rgba(212, 184, 150, 0.3);
    position: relative;
    overflow: hidden;
  }

  /* Decorative leaf SVG in corner */
  .card::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, var(--sage-soft) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-leaf {
    width: 32px;
    height: 32px;
    position: relative;
  }

  .brand-leaf svg {
    width: 100%;
    height: 100%;
  }

  .brand h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--earth);
    letter-spacing: -0.3px;
    font-optical-sizing: auto;
  }

  .brand-sub {
    font-size: 11px;
    font-weight: 300;
    color: var(--clay);
    margin-left: 4px;
  }

  .header-actions {
    display: flex;
    gap: 6px;
  }

  .btn {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 9px 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .btn-subtle {
    background: transparent;
    color: var(--clay);
    border: 1px solid transparent;
  }

  .btn-subtle:hover {
    background: var(--white);
    border-color: var(--sand);
  }

  .btn-accent {
    background: var(--sage);
    color: var(--white);
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(122, 155, 126, 0.25);
  }

  .btn-accent:hover {
    background: #6d8e71;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(122, 155, 126, 0.3);
  }

  .btn-outline {
    background: transparent;
    color: var(--bark);
    border: 1px solid var(--sand);
  }

  .btn-outline:hover {
    background: var(--white);
    border-color: var(--clay);
  }

  /* Controls */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    padding: 16px 20px;
    background: var(--white);
    border-radius: 16px;
    border: 1px solid rgba(212, 184, 150, 0.2);
  }

  .polish-btn {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 400;
    padding: 10px 28px;
    background: var(--earth);
    color: var(--linen);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .polish-btn::after {
    content: '🌿';
    position: absolute;
    right: -8px;
    top: -8px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
    transform: rotate(-20deg);
  }

  .polish-btn:hover {
    background: var(--bark);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(44, 36, 24, 0.15);
  }

  .polish-btn:hover::after {
    opacity: 1;
    right: -12px;
    top: -12px;
  }

  .sep {
    width: 1px;
    height: 28px;
    background: var(--sand);
    opacity: 0.5;
  }

  .tone-area {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .tone-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--clay);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .tone-btns {
    display: flex;
    gap: 6px;
  }

  .tone-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 7px 16px;
    border-radius: 10px;
    border: 1px solid var(--sand);
    background: var(--parchment);
    color: var(--bark);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tone-btn:hover {
    border-color: var(--sage);
    color: var(--sage);
    background: var(--sage-soft);
  }

  .tone-btn.locked {
    opacity: 0.35;
    cursor: default;
  }

  .unlock-note {
    font-size: 11px;
    color: var(--clay);
    font-style: italic;
    font-family: 'Fraunces', serif;
    opacity: 0.7;
  }

  /* Editor */
  .editor-section {
    margin-bottom: 20px;
  }

  .editor-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .editor-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--clay);
    font-weight: 500;
  }

  .editor-wrap {
    background: var(--white);
    border: 1.5px solid rgba(212, 184, 150, 0.25);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: var(--shadow);
  }

  .editor-wrap:focus-within {
    border-color: var(--sage-border);
    box-shadow: 0 0 0 4px var(--sage-soft), var(--shadow-lg);
  }

  textarea {
    width: 100%;
    min-height: 380px;
    padding: 28px 32px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--earth);
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
  }

  textarea::placeholder {
    color: var(--sand);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
  }

  .stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--clay);
    font-weight: 300;
  }

  .stat-val {
    font-weight: 500;
    color: var(--bark);
  }

  .footer-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .footer-note {
    font-size: 11px;
    color: var(--clay);
    font-style: italic;
    font-family: 'Fraunces', serif;
    opacity: 0.7;
  }

  .attribution {
    font-size: 11px;
    color: var(--clay);
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="header">
      <div class="brand">
        <div class="brand-leaf">
          <svg viewBox="0 0 32 32" fill="none">
            <path d="M16 4C16 4 8 8 8 18c0 6 4 10 8 10s8-4 8-10c0-10-8-14-8-14z" fill="#7a9b7e" opacity="0.2"/>
            <path d="M16 4C16 4 8 8 8 18c0 6 4 10 8 10s8-4 8-10c0-10-8-14-8-14z" stroke="#7a9b7e" stroke-width="1.5" fill="none"/>
            <path d="M16 10v14" stroke="#7a9b7e" stroke-width="1" opacity="0.5"/>
            <path d="M16 16c-3-2-5-1-6 0" stroke="#7a9b7e" stroke-width="0.8" opacity="0.4"/>
            <path d="M16 13c2-2 4-1.5 5-0.5" stroke="#7a9b7e" stroke-width="0.8" opacity="0.4"/>
          </svg>
        </div>
        <h1>PolishPad</h1>
        <span class="brand-sub">text care</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-subtle">Cancel</button>
        <button class="btn btn-subtle">Undo</button>
        <button class="btn btn-accent">Copy</button>
        <button class="btn btn-outline">Settings</button>
      </div>
    </div>

    <div class="controls-row">
      <button class="polish-btn">Polish</button>
      <div class="sep"></div>
      <div class="tone-area">
        <span class="tone-label">After polish</span>
        <div class="tone-btns">
          <button class="tone-btn locked">Casual</button>
          <button class="tone-btn locked">Professional</button>
          <button class="tone-btn locked">Direct</button>
        </div>
        <span class="unlock-note">Unlocks after one Polish pass</span>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-top">
        <span class="editor-label">Your Text</span>
      </div>
      <div class="editor-wrap">
        <textarea placeholder="Paste or write text here. Polish first, then choose a tone if needed."></textarea>
      </div>
    </div>

    <div class="footer">
      <div class="stats">
        <span><span class="stat-val">0</span> words</span>
        <span>·</span>
        <span><span class="stat-val">0</span> chars</span>
        <span>·</span>
        <span>Mode: None</span>
        <span>·</span>
        <span>Latency: —</span>
        <span>·</span>
        <span>Warnings: None</span>
      </div>
      <div class="footer-right">
        <span class="footer-note">Transforms apply to current text</span>
        <span class="attribution">@laup30 · 🇿🇦 Cape Town</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
